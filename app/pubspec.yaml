name: atrium
description: Atrium - mobile controller for a self-hosted media stack.
publish_to: none
resolution: workspace
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  collection: ^1.18.0
  connectivity_plus: ^6.1.0
  core_models:
  core_networking:
  core_player:
  core_profile:
  core_router:
  core_storage:
  core_ui:
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.3
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive_ce: ^2.10.1
  service_bazarr:
  service_emby:
  service_jellyfin:
  service_overseerr:
  service_plex:
  service_prowlarr:
  service_qbittorrent:
  service_radarr:
  service_sabnzbd:
  service_sonarr:
  service_tautulli:

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/atrium_icon.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icon/atrium_foreground.png"
  min_sdk_android: 23
