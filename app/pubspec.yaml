name: atrium
description: Atrium - mobile controller for a self-hosted media stack.
publish_to: none
resolution: workspace
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  collection: ^1.18.0
  connectivity_plus: ^7.2.0
  core_models:
  core_networking:
  core_profile:
  core_router:
  core_storage:
  core_ui:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^12.0.0-beta.7
  intl: ^0.20.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  hive_ce: ^2.10.1
  service_bazarr:
  service_emby:
  service_jellyfin:
  service_seerr:
  service_plex:
  service_prowlarr:
  service_qbittorrent:
  service_radarr:
  service_sabnzbd:
  service_sonarr:
  service_glances:
  service_tautulli:
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  m3_expressive: ^1.0.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/service_icons/
    - assets/glyphs/
  fonts:
    - family: JetBrainsMono Nerd Font
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFont-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/atrium_icon.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icon/atrium_foreground.png"
  min_sdk_android: 23
