name: core_player
description: >
  Shared full-screen video player for Atrium, built on media_kit (libmpv) so
  it direct-plays the wide range of codecs/containers self-hosters keep
  (HEVC, MKV, etc.) without server-side transcoding.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_libs_video: ^1.0.5
  media_kit_video: ^1.2.5
  meta: ^1.16.0

dev_dependencies:
  build_runner: ^2.4.13
