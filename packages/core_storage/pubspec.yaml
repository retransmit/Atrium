name: core_storage
description: >
  Secure storage (API keys via Android Keystore), Hive boxes for non-secret
  config, and biometric-unlock helpers for Atrium.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.0.0
  local_auth: ^3.0.1
  meta: ^1.16.0
  path_provider: ^2.1.5

dev_dependencies:
  build_runner: ^2.4.13
